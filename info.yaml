# Tiny Tapeout project information
project:
  title:        "Bandgap Reference + PTAT Sensor"
  author:       "TechHU"
  discord:      ""
  description:  "Bandgap voltage reference and PTAT temperature sensor on IHP SG13G2 130nm"
  language:     "Verilog"
  clock_hz:     0

  tiles: "1x2"
  analog_pins: 2

  top_module:  "tt_um_techhu_analog_trial"

  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "enable"
  ui[1]: "sel[0]"
  ui[2]: "sel[1]"
  ui[3]: "sel[2]"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "selected_tap"
  uo[1]: "tap_7inv"
  uo[2]: "tap_13inv"
  uo[3]: "tap_21inv"
  uo[4]: "tap_51inv"
  uo[5]: "tap_101inv"
  uo[6]: "tap_201inv"
  uo[7]: "tap_351inv"

  # Bidirectional pins
  uio[0]: "tap_501inv"
  uio[1]: "tap_3inv"
  uio[2]: "tap_5inv"
  uio[3]: "tap_31inv"
  uio[4]: "tap_75inv"
  uio[5]: "tap_149inv"
  uio[6]: "tap_251inv"
  uio[7]: "tap_401inv"

  # Analog pins
  ua[0]: "V_BG (bandgap ~1.2V)"
  ua[1]: "V_PTAT (temp proportional)"

yaml_version: 6
